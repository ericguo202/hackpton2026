<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are pulled from Google Fonts via @import in src/index.css.
         Preconnect lets the DNS/TLS handshake happen in parallel with the
         CSS request so Fraunces/Geist start downloading sooner on first paint.
         `crossorigin` is REQUIRED on fonts.gstatic.com — font binaries are
         fetched with CORS, so without it the preconnect is wasted. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
